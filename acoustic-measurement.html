<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acoustic Measurement</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  padding: 20px;
  min-height: 100vh;
}
h1 {
  font-size: 22px;
  font-weight: 600;
  margin: 0 auto 20px;
  max-width: 1400px;
  color: #58a6ff;
  letter-spacing: 0.3px;
}
h2 {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 10px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
h3 {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  color: #8b949e;
}
/* ===== Layout ===== */
.app-grid {
  display: flex;
  gap: 8px;
  max-width: 1400px;
  margin: 0 auto;
  align-items: flex-start;
}
.left-col {
  width: 320px;
  flex-shrink: 0;
}
.right-col {
  flex: 1;
  min-width: 0;
}
/* ===== Resizer ===== */
.resizer {
  width: 5px;
  cursor: col-resize;
  flex-shrink: 0;
  align-self: stretch;
  background: #30363d;
  border-radius: 2px;
  transition: background 0.15s;
}
.resizer:hover,
.resizer.resizing {
  background: #58a6ff;
}
@media (max-width: 900px) {
  .app-grid { flex-direction: column; }
  .left-col { width: 100% !important; }
  .right-col { width: 100%; }
  .canvas-wrap canvas { width: 100% !important; height: auto !important; }
  .resizer { display: none; }
  body { padding: 16px 10px; }
}
.panel {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 12px;
}
.panel-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 8px;
}
.panel-row:last-child { margin-bottom: 0; }
/* ===== Form Controls ===== */
label {
  font-size: 13px;
  color: #8b949e;
  white-space: nowrap;
}
select, input[type="range"], input[type="number"] {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
  padding: 4px 8px;
  font-size: 13px;
}
select { min-width: 120px; }
select:focus { border-color: #58a6ff; outline: none; }
input[type="number"] {
  -moz-appearance: textfield;
  padding: 4px 6px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type="number"]:focus { border-color: #58a6ff; outline: none; }
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #30363d;
  border-radius: 2px;
  border: none;
  padding: 0;
  flex: 1;
  min-width: 80px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #58a6ff;
  cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #58a6ff;
  cursor: pointer;
  border: none;
}
.range-value {
  font-size: 13px;
  color: #58a6ff;
  min-width: 36px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.chk-label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  cursor: pointer;
  color: #c9d1d9;
}
.chk-label input[type="checkbox"] {
  accent-color: #58a6ff;
}
/* ===== Buttons ===== */
.btn {
  border: none;
  border-radius: 6px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
  color: #fff;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #238636; }
.btn-primary:hover:not(:disabled) { background: #2ea043; }
.btn-danger { background: #da3633; }
.btn-danger:hover:not(:disabled) { background: #f85149; }
.btn-accent { background: #1f6feb; }
.btn-accent:hover:not(:disabled) { background: #388bfd; }
.btn-secondary { background: #21262d; border: 1px solid #30363d; }
.btn-secondary:hover:not(:disabled) { background: #30363d; }
.btn-sm { padding: 3px 10px; font-size: 12px; }
/* ===== Progress ===== */
.progress-bar {
  height: 6px;
  background: #21262d;
  border-radius: 3px;
  overflow: hidden;
  margin: 6px 0;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #58a6ff, #1f6feb);
  transition: width 0.1s;
}
.progress-text {
  font-size: 12px;
  color: #8b949e;
  text-align: center;
}
/* ===== Canvas ===== */
.canvas-wrap {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
.canvas-wrap canvas {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 2 / 1;
  cursor: crosshair;
}
.canvas-legend {
  display: flex;
  gap: 18px;
  padding: 8px 14px;
  flex-wrap: wrap;
  font-size: 12px;
  background: #0d1117;
  border-top: 1px solid #30363d;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.legend-dot {
  width: 20px;
  height: 3px;
  border-radius: 2px;
}
/* ===== PEQ List ===== */
.peq-list { margin-top: 8px; }
.peq-item {
  display: grid;
  grid-template-columns: auto 1fr 1fr 1fr auto;
  gap: 4px;
  align-items: center;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 8px 10px;
  margin-bottom: 14px;
}
.peq-item .peq-params {
  display: contents;
}
.peq-item .param-group {
  display: flex;
  align-items: center;
  gap: 4px;
}
.peq-item .param-group label {
  font-size: 11px;
  min-width: 14px;
}
.peq-item .param-group .range-value {
  font-size: 11px;
  min-width: 30px;
}
.peq-summary {
  font-size: 12px;
  color: #8b949e;
  text-align: center;
  padding: 10px 0 4px;
}
/* ===== Status ===== */
.status-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}
.status-idle { background: #21262d; color: #8b949e; }
.status-active { background: #1f6feb33; color: #58a6ff; animation: pulse 1.5s infinite; }
.status-done { background: #23863633; color: #3fb950; }
.status-error { background: #da363333; color: #f85149; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
/* ===== Level Meter ===== */
.meter-track {
  height: 10px;
  background: #0d1117;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid #21262d;
  position: relative;
}
.meter-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.06s ease;
  background: linear-gradient(90deg, #3fb950 0%, #d29922 55%, #da3633 85%, #f85149 100%);
}
/* ===== Left sidebar narrow ===== */
.narrow-input { max-width: 70px; }
.flex-col { display: flex; flex-direction: column; gap: 8px; }
.flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.grow { flex: 1; }
.mt-6 { margin-top: 6px; }
.mb-6 { margin-bottom: 6px; }

/* ===== Confirm Dialog ===== */
.confirm-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:center;
  z-index:9999;
}
.confirm-box {
  background:#161b22; border:1px solid #30363d; border-radius:12px;
  padding:28px 32px; min-width:340px; max-width:460px;
  box-shadow:0 16px 48px rgba(0,0,0,0.5);
}
.confirm-box p {
  color:#c9d1d9; font-size:14px; line-height:1.6; margin:0 0 24px;
}
.confirm-actions {
  display:flex; gap:10px; justify-content:flex-end;
}
.confirm-actions .btn { min-width:90px; }
</style>
</head>
<body>

<div style="max-width:1400px;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between">
  <h1 style="margin:0">🎧 声学测量工具</h1>
  <select id="langSelect" style="min-width:110px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:4px 8px;font-size:12px">
    <option value="zh">中文</option>
    <option value="en">English</option>
    <option value="fr">Français</option>
    <option value="es">Español</option>
    <option value="ru">Русский</option>
    <option value="de">Deutsch</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="pt">Português</option>
  </select>
</div>

<div class="app-grid">

<!-- ===== LEFT SIDEBAR ===== -->
<div class="left-col">

  <!-- 设备选择 -->
  <div class="panel" id="devicePanel">
    <h2>设备 / Device</h2>
    <div class="panel-row" style="flex-direction:column;align-items:stretch;gap:2px">
      <label>输入</label>
      <select id="inDevice" class="grow"></select>
    </div>
    <div class="panel-row" style="flex-direction:column;align-items:stretch;gap:2px">
      <label>输入声道</label>
      <select id="inChannel" style="width:100%">
        <option value="0">L</option>
        <option value="1">R</option>
      </select>
    </div>
    <div class="panel-row" id="outDeviceRow" style="flex-direction:column;align-items:stretch;gap:2px">
      <label>输出</label>
      <select id="outDevice" class="grow"></select>
    </div>
    <div class="panel-row" style="flex-direction:column;align-items:stretch;gap:2px">
      <label>输出声道</label>
      <select id="outChannel" style="width:100%">
        <option value="all">全部</option>
        <option value="0">L</option>
        <option value="1">R</option>
      </select>
    </div>
    <div class="panel-row">
      <button id="refreshDevices" class="btn btn-secondary btn-sm">🔄 刷新设备</button>
      <span id="audioStatus" class="status-badge status-idle">待机</span>
    </div>
  </div>

  <!-- 输入电平（独立面板，全局可见） -->
  <div class="panel" id="levelPanel">
    <h2>输入电平 / Input Level</h2>
    <div class="panel-row" style="flex-direction:column;align-items:stretch;gap:2px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#8b949e">
        <span id="levelLabel">—</span>
        <span id="levelDB">—∞ dB</span>
      </div>
      <div class="meter-track">
        <div class="meter-fill" id="meterFill" style="width:0%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#484f58">
        <span>-70</span><span>-35</span><span>0 dB</span>
      </div>
    </div>
  </div>

  <!-- 调整 -->
  <div class="panel" id="adjustPanel">
    <h2>调整 / Adjust</h2>
    <div class="panel-row">
      <button id="playNoiseBtn" class="btn btn-accent btn-sm">▶ 白噪声</button>
      <button id="stopNoiseBtn" class="btn btn-secondary btn-sm" disabled>■ 停止</button>
    </div>
    <div class="panel-row" style="flex-direction:column;align-items:stretch;gap:2px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <label>输入增益</label>
        <button id="autoLevelBtn" class="btn btn-accent btn-sm" disabled>自动调整</button>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <input type="range" id="inGain" min="-12" max="36" value="0" step="1" style="flex:1">
        <span id="inGainVal" class="range-value">0</span>
      </div>
    </div>
  </div>

  <!-- 测试 -->
  <div class="panel" id="sweepPanel">
    <h2>测试 / Sweep</h2>
    <div class="panel-row">
      <button id="startSweepBtn" class="btn btn-primary">▶ 开始扫频</button>
      <button id="stopSweepBtn" class="btn btn-danger" disabled>■ 停止</button>
    </div>
    <div class="panel-row">
      <label>起始</label>
      <input type="number" id="sweepFreqLow" value="20" min="10" max="20000" style="width:64px">
      <span style="font-size:11px;color:#8b949e;margin-left:-4px">Hz</span>
      <label>终止</label>
      <input type="number" id="sweepFreqHigh" value="20000" min="20" max="24000" style="width:64px">
      <span style="font-size:11px;color:#8b949e;margin-left:-4px">Hz</span>
    </div>
    <div class="panel-row">
      <label>点数</label>
      <input type="number" id="sweepPoints" value="100" min="5" max="500" style="width:56px">
      <label>时长</label>
      <input type="number" id="pointDuration" value="100" min="20" max="1000" style="width:56px">
      <span style="font-size:11px;color:#8b949e;margin-left:-4px">ms</span>
    </div>
    <div class="panel-row">
      <label class="chk-label">
        <input type="checkbox" id="useFilter" checked>
        带通滤波
      </label>
      <label>Q</label>
      <input type="number" id="filterQ" value="5" min="0.5" max="20" step="0.5" style="width:50px">
    </div>
    <!-- 进度由下方状态栏显示 -->
    <div class="panel-row" style="margin-top:6px;padding-top:6px;border-top:1px solid #21262d">
      <span id="measureStatus" class="status-badge status-idle">就绪</span>
      <span style="font-size:12px;color:#8b949e" id="statusDetail">等待测量</span>
    </div>
  </div>
</div>

<div class="resizer" id="resizer"></div>

<!-- ===== RIGHT MAIN ===== -->
<div class="right-col">

  <!-- Canvas -->
  <div class="panel" style="padding:0;overflow:hidden">
    <div class="canvas-wrap">
      <canvas id="freqChart"></canvas>
      <div class="canvas-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> 原始频响 <span style="color:#8b949e;font-size:10px">(左轴)</span></span>
        <span class="legend-item"><span class="legend-dot" style="background:#da3633"></span> PEQ <span style="color:#8b949e;font-size:10px">(右轴)</span></span>
        <span class="legend-item"><span class="legend-dot" style="background:#3fb950"></span> 校正后</span>
        <span class="legend-item" style="color:#8b949e">↕ <span id="yRangeLabel">L-- R-- dB</span></span>
      </div>
    </div>
  </div>

  <!-- PEQ -->
  <div class="panel" id="peqPanel">
    <div class="flex-row">
      <h2 style="margin-bottom:0">Parametric EQ</h2>
      <button id="addPeqBtn" class="btn btn-accent btn-sm">＋ 添加</button>
      <button id="clearPeqBtn" class="btn btn-secondary btn-sm">清除</button>
      <span id="peqCount" style="font-size:12px;color:#8b949e;margin-left:auto">0 个</span>
    </div>
    <div class="panel-row" style="flex-wrap:wrap;gap:8px;padding:8px 0;border-bottom:1px solid #21262d;margin-bottom:6px">
      <span style="font-size:12px;color:#8b949e;white-space:nowrap" data-i18n="autoPeqLabel">自动 PEQ</span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <label style="font-size:11px" data-i18n="autoPeqCount">数量</label>
        <input type="number" id="autoPeqCount" value="10" min="1" max="20" style="width:44px">
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <label style="font-size:11px" data-i18n="autoPeqFlat">调整响应范围</label>
        <input type="number" id="autoPeqFreqLow" value="50" min="10" max="20000" style="width:48px">
        <span style="font-size:10px;color:#8b949e">~</span>
        <input type="number" id="autoPeqFreqHigh" value="16000" min="20" max="24000" style="width:60px">
        <span style="font-size:10px;color:#8b949e">Hz</span>
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <label style="font-size:11px" data-i18n="autoPeqTilt">低频增益</label>
        <input type="number" id="autoPeqTilt" value="0" min="-24" max="24" step="0.5" style="width:50px">
        <span style="font-size:10px;color:#8b949e">dB</span>
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <label style="font-size:11px">
          <input type="checkbox" id="autoPeqShelving" checked style="margin:0 3px 0 0;vertical-align:middle">
          搁架
        </label>
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <label style="font-size:11px" data-i18n="autoPeqGain">PEQ 增益</label>
        <input type="number" id="autoPeqMaxGain" value="12" min="1" max="40" style="width:42px">
        <span style="font-size:10px;color:#8b949e">±dB</span>
      </span>
      <button id="autoPeqBtn" class="btn btn-primary btn-sm" style="margin-left:auto" data-i18n="autoPeqBtn">▶ 生成</button>
    </div>
    <div id="peqList" class="peq-list"></div>
    <div id="peqEmpty" class="peq-summary">尚未添加 PEQ — 点击「添加」创建</div>
  </div>

  <!-- 导入/导出 -->
  <div class="panel">
    <div class="flex-row">
      <button id="exportBtn" class="btn btn-secondary btn-sm">📤 导出数据</button>
      <button id="importBtn" class="btn btn-secondary btn-sm">📥 导入数据</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <label style="font-size:11px;margin-left:8px" data-i18n="targetSpl">目标 SPL</label>
      <input type="number" id="targetSplInput" value="75" min="40" max="120" step="0.5" style="width:50px">
      <span style="font-size:10px;color:#8b949e">dB</span>
      <label style="font-size:11px;margin-left:8px" data-i18n="autoPeqTarget">目标增益</label>
      <input type="number" id="autoPeqTarget" value="0" min="-40" max="0" step="0.5" style="width:50px">
      <span style="font-size:10px;color:#8b949e">dB</span>
      <button id="exportRewBtn" class="btn btn-secondary btn-sm" data-i18n="exportRew">📤 REW</button>
      <span style="font-size:12px;color:#8b949e" id="dataInfo">无测量数据</span>
    </div>
  </div>
</div>

</div>

<script>
// ========================================================================
//  多语言翻译
// ========================================================================
const LANGUAGES = ['zh','en','fr','es','ru','de','ja','ko','pt'];
const LOCALE_NAMES = { zh:'中文', en:'English', fr:'Français', es:'Español',
  ru:'Русский', de:'Deutsch', ja:'日本語', ko:'한국어', pt:'Português' };

const STR = {
  zh: {
    appTitle:'🎧 声学测量工具', device:'设备', input:'输入设备',
    output:'输出设备', inputCh:'输入声道', outputCh:'输出声道', all:'全部', refresh:'🔄 刷新设备', standby:'待机', micReady:'麦克风已就绪',
    micErr:'麦克风错误', micFail:'麦克风启动失败',
    level:'输入电平', adjust:'调整', noise:'▶ 白噪声',
    stop:'■ 停止', inGain:'输入增益', autoLevel:'自动调整',
    sweep:'测试', startSweep:'▶ 开始扫频', stopSweep:'■ 停止',
    from:'起始', to:'终止', points:'点数', dur:'时长', ms:'ms',
    filter:'带通滤波',
    ready:'就绪', waiting:'等待测量', preparing:'准备中…', processing:'处理中…',
    measuring:'测量中', pointFmt:(c,t,f)=>`点 ${c}/${t}  ${f.toFixed(0)} Hz`,
    done:'完成', doneFmt:(n,lo,hi)=>`${n} 个频率点 · 范围 ${lo}–${hi} Hz`,
    error:'错误', stopped:'已停止', aborted:'测量被中止',
    failed:'失败', noData:'测量数据不足，请检查输入/输出设备和音量', noSweepData:'数据不足，请先执行扫频测量',
    peqGenFailed:'未能生成 PEQ 参数', peqGenDone:(n)=>`自动 PEQ: ${n} 个`,
    selectMicFirst:'请先选择输入设备并启动麦克风',
    dataInfo:(n,lo,hi,t)=>`数据: ${n} 点 · ${lo}–${hi} Hz · ${t}`,
    importOk:(n)=>`导入: ${n} 点`, importFail:'导入失败',
    noDataExport:'没有测量数据可以导出', invalidFile:'无效的数据文件',
    rawResp:'原始频响', peq:'PEQ', corrected:'校正后', leftAxis:'(左轴)', rightAxis:'(右轴)',
    peqTitle:'参数均衡器', peqAdd:'＋ 添加', peqClear:'清除',

/** 根据声道数返回标准扬声器标签 */
function getChannelLabels(chCount) {
  const LABELS = {
    1: ['M'],
    2: ['L', 'R'],
    4: ['L', 'R', 'SL', 'SR'],
    6: ['L', 'R', 'C', 'LFE', 'SL', 'SR'],
    8: ['L', 'R', 'C', 'LFE', 'SL', 'SR', 'RL', 'RR'],
  };
  return LABELS[chCount] || Array.from({ length: chCount }, (_, i) => `${i + 1}`);
}

/** 重建声道选择下拉框（根据实际声道数动态生成） */
function rebuildChannelOptions(selectId, chCount, isOutput) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const val = sel.value;
  const n = chCount || 2;
  const labels = getChannelLabels(n);
  let html = '';
  if (isOutput) {
    html += `<option value="all" selected>${tr('all')}</option>`;
  }
  for (let i = 0; i < n; i++) {
    html += `<option value="${i}">${labels[i]}</option>`;
  }
  sel.innerHTML = html;
  if (val && (val === 'all' || (parseInt(val) < n))) sel.value = val;
}

function detectBrowserLang() {
  const navLang = (navigator.language || navigator.userLanguage || 'en').slice(0,2).toLowerCase();
  return LANGUAGES.includes(navLang) ? navLang : 'en';
}

// ========================================================================
// ========================================================================
//  AudioEngine — Web Audio 引擎
//  职责：创建 AudioContext，管理输入（麦克风）和输出（播放）音频链，
//  生成白噪声，执行扫频测量，自动调整输入电平
// ========================================================================
//  AudioEngine — 管理 Web Audio 上下文、设备、节点
// ========================================================================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.micStream = null;
    this.micSource = null;
    this.micGain = null;
    this.micAnalyser = null;
    this.masterGain = null;
    this.masterAnalyser = null;
    this._running = false;
    this._noiseSource = null;
    this._noiseGain = null;
    this._sweepOsc = null;
    this._sweepGain = null;
    this._sweepRunning = false;
    this._onAudioData = null; // callback (buffer) when mic data arrives
    this._scriptNode = null;
    this._inputBuffers = [];
    this._isRecording = false;
    this._micPanner = null;
    this._inChannelCount = 2;
    this._outGains = [];
    this._outMerger = null;
    this._outChCount = 2;
  }

  async init() {
    if (this.ctx && this.ctx.state !== 'closed') return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 1;
    this.masterAnalyser = this.ctx.createAnalyser();
    this.masterAnalyser.fftSize = 1024;
    // 多声道输出路由：masterGain → 每声道独立 Gain → Merger → destination
    this._outChCount = Math.min(this.ctx.destination.maxChannelCount || 2, 8);
    this._outGains = [];
    this._outMerger = this.ctx.createChannelMerger(this._outChCount);
    for (let i = 0; i < this._outChCount; i++) {
      const g = this.ctx.createGain();
      g.gain.value = 1;
      this._outGains.push(g);
      this.masterGain.connect(g);
      g.connect(this._outMerger, 0, i);
    }
    this._outMerger.connect(this.masterAnalyser);
    this.masterAnalyser.connect(this.ctx.destination);
    // Default out vol
    this.setOutVolume(-12);
    // Input chain (built after mic starts)
  }

  async startMic(deviceId) {
    if (this.micStream) {
      this.stopMic();
    }
    // 释放 init 阶段预申请的权限流
    if (window._permStream) {
      window._permStream.getTracks().forEach(t => t.stop());
      window._permStream = null;
    }
    const constraints = {
      audio: {
        deviceId: deviceId ? { exact: deviceId } : undefined,
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      }
    };
    this.micStream = await navigator.mediaDevices.getUserMedia(constraints);
    // 检测输入声道数
    try {
      const track = this.micStream.getAudioTracks()[0];
      const settings = track.getSettings();
      this._inChannelCount = settings.channelCount || 2;
    } catch(e) {
      this._inChannelCount = 2;
    }
    this.micSource = this.ctx.createMediaStreamSource(this.micStream);
    this.micGain = this.ctx.createGain();
    this.micGain.gain.value = 1; // 0dB
    this.micAnalyser = this.ctx.createAnalyser();
    this.micAnalyser.fftSize = 2048;
    this.micSource.connect(this.micGain);
    this.micGain.connect(this.micAnalyser);
    // Don't connect mic to destination (no feedback)
    return true;
  }

  stopMic() {
    if (this.micStream) {
      this.micStream.getTracks().forEach(t => t.stop());
      this.micStream = null;
    }
    this.micSource = null;
    this.micGain = null;
    this.micAnalyser = null;
    this._inputBuffers = [];
    this._isRecording = false;
  }

  /** 设置输出音量（dB），先取消已调度值再设定，兼容 Safari */
  setOutVolume(dB) {
    if (!this.masterGain) return;
    const gain = Math.pow(10, dB / 20);
    this.masterGain.gain.cancelScheduledValues(0);
    this.masterGain.gain.setValueAtTime(gain, this.ctx.currentTime);
  }

  /** 设置输入增益（dB），先取消已调度值再设定 */
  setInGain(dB) {
    if (!this.micGain) return;
    const gain = Math.pow(10, dB / 20);
    this.micGain.gain.cancelScheduledValues(0);
    this.micGain.gain.setValueAtTime(gain, this.ctx.currentTime);
  }

  /** 设置输出声道：'all'=所有声道，'0'/'1'/...=指定声道 */
  setOutputChannel(mode) {
    if (!this._outGains || this._outGains.length === 0) return;
    if (mode === 'all') {
      for (const g of this._outGains) g.gain.value = 1;
    } else {
      const idx = parseInt(mode);
      for (let i = 0; i < this._outGains.length; i++) {
        this._outGains[i].gain.value = (i === idx) ? 1 : 0;
      }
    }
  }

  /** 切换输出设备（仅 Chrome setSinkId 支持） */
  async setOutputDevice(deviceId) {
    if (!this.ctx || typeof this.ctx.setSinkId !== 'function') return false;
    try {
      await this.ctx.setSinkId(deviceId);
      return true;
    } catch (e) {
      console.warn('输出设备切换失败:', e);
      return false;
    }
  }

  /** 静态检测当前浏览器是否支持输出设备切换 */
  static supportsOutputSwitch() {
    return typeof AudioContext !== 'undefined' &&
      typeof AudioContext.prototype.setSinkId === 'function';
  }

  // ---- 白噪声（单声道） ----
  startNoise(volumeDB = -12) {
    if (!this.ctx || !this.masterGain) return;
    this.stopNoise();
    const bufferSize = this.ctx.sampleRate * 2;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1);
    }
    this._noiseSource = this.ctx.createBufferSource();
    this._noiseSource.buffer = buffer;
    this._noiseSource.loop = true;
    this._noiseGain = this.ctx.createGain();
    this._noiseGain.gain.cancelScheduledValues(0);
    this._noiseGain.gain.setValueAtTime(Math.pow(10, volumeDB / 20), this.ctx.currentTime);
    this._noiseSource.connect(this._noiseGain);
    this._noiseGain.connect(this.masterGain);
    this._noiseSource.start();
  }

  stopNoise() {
    if (this._noiseSource) {
      try { this._noiseSource.stop(); } catch(e) {}
      this._noiseSource = null;
    }
    this._noiseGain = null;
  }

  // ---- 扫频测量 ----
  async runSweepMeasure(freqLow, freqHigh, numPoints, pointDurMs, onProgress, onDone, onError, outChan, inChan, useFilter, filterQ) {
    if (!this.ctx || !this.micGain) {
      onError(tr('selectMicFirst'));
      return;
    }
    if (this._sweepRunning) return;
    this._sweepRunning = true;
    this._inputBuffers = [];
    this._isRecording = true;

    const sampleRate = this.ctx.sampleRate;
    const freqs = [];
    const logLow = Math.log(freqLow);
    const logHigh = Math.log(freqHigh);
    for (let i = 0; i < numPoints; i++) {
      const f = Math.exp(logLow + (logHigh - logLow) * i / (numPoints - 1));
      freqs.push(f);
    }

    const results = [];

    // Setup ScriptProcessorNode for capture（输入声道数取实际值）
    const inChCount = this._inChannelCount || 2;
    const scriptNode = this.ctx.createScriptProcessor(2048, inChCount, 1);
    const inputBuffer = [];
    let totalSamplesReceived = 0;
    scriptNode.onaudioprocess = (e) => {
      if (!this._isRecording) return;
      const chIdx = parseInt(inChan);
      if (chIdx >= e.inputBuffer.numberOfChannels) return;
      const data = e.inputBuffer.getChannelData(chIdx);
      inputBuffer.push(new Float32Array(data));
      totalSamplesReceived += data.length;
    };

    // Use mute node to avoid mic feedback to speakers
    const muteGain = this.ctx.createGain();
    muteGain.gain.value = 0;

    // 可选的带通滤波器：只通过当前播放频率附近的能量，滤除环境噪声
    let bpFilter = null;
    if (useFilter) {
      bpFilter = this.ctx.createBiquadFilter();
      bpFilter.type = 'bandpass';
      bpFilter.frequency.value = freqs[0];
      bpFilter.Q.value = filterQ || 5;
      this.micGain.connect(bpFilter);
      bpFilter.connect(scriptNode);
    } else {
      this.micGain.connect(scriptNode);
    }
    scriptNode.connect(muteGain);
    muteGain.connect(this.ctx.destination);

    // Create oscillator + gain for sweep
    const osc = this.ctx.createOscillator();
    const sweepGain = this.ctx.createGain();
    sweepGain.gain.value = Math.pow(10, -6/20);
    osc.type = 'sine';
    osc.connect(sweepGain);
    sweepGain.connect(this.masterGain);

    osc.start();

    // 先播放 250ms 让系统稳定，再静音 2000ms，然后开始正式测量
    await this._sleep(250);
    sweepGain.gain.value = 0;
    await this._sleep(2000);
    sweepGain.gain.value = Math.pow(10, -6/20);

    let stopped = false;
    const sampleStartPositions = [];

    for (let i = 0; i < numPoints; i++) {
      if (!this._sweepRunning || stopped) {
        stopped = true;
        break;
      }
      const freq = freqs[i];

      // 低频需要更长时间稳定：20Hz→3x, 100Hz→1.5x, 1kHz→1x
      const freqFactor = Math.max(1, Math.min(3, 120 / freq));
      const actualDur = Math.round(pointDurMs * freqFactor);
      const actualSamples = Math.floor(sampleRate * actualDur / 1000);
      const actualSettle = Math.floor(actualSamples * 0.3);
      const actualMeasure = actualSamples - actualSettle;

      osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
      if (bpFilter) bpFilter.frequency.setValueAtTime(freq, this.ctx.currentTime);
      sampleStartPositions.push(totalSamplesReceived);
      onProgress(i + 1, numPoints, freq);

      await this._sleep(actualDur);

      // 测量本频率点（跳过 settle 段）
      const startSample = sampleStartPositions[i];
      const rms = this._measureBlockRMS(inputBuffer, startSample, totalSamplesReceived,
                                        actualSettle, actualMeasure);
      const phase = this._measurePhase(freq, sampleRate, inputBuffer, startSample,
                                        totalSamplesReceived, actualSettle, actualMeasure);
      if (rms > 0) {
        results.push({ freq, rms, dB: 20 * Math.log10(rms), phase });
      }
    }

    // Cleanup
    osc.stop();
    // 清理音频节点
    if (bpFilter) {
      this.micGain.disconnect(bpFilter);
      bpFilter.disconnect();
    } else {
      this.micGain.disconnect(scriptNode);
    }
    scriptNode.disconnect();
    muteGain.disconnect();
    this._isRecording = false;
    this._sweepRunning = false;

    if (stopped) {
      onDone(null, true);
      return;
    }

    // Normalize: shift so max = 0 dB
    if (results.length > 0) {
      const maxDB = Math.max(...results.map(r => r.dB));
      results.forEach(r => { r.dB_norm = r.dB - maxDB; });
    }

    onDone(results, false);
  }

  /** RMS from a specific sample range in the flat buffer, skipping settle */
  _measureBlockRMS(buffer, startSample, totalSamples, settleCount, measureCount) {
    let totalLen = 0;
    for (let i = 0; i < buffer.length; i++) totalLen += buffer[i].length;

    const bufBeforeStart = startSample;
    const samplesAfterStart = totalLen - bufBeforeStart;
    if (samplesAfterStart < settleCount + 10) return 0;

    const measureStart = bufBeforeStart + settleCount;
    const available = totalLen - measureStart;
    const take = Math.min(available, measureCount);

    let sumSq = 0;
    let copied = 0;
    let cursor = 0;
    for (let i = 0; i < buffer.length; i++) {
      const chunk = buffer[i];
      const chunkStart = cursor;
      const chunkEnd = cursor + chunk.length;
      cursor = chunkEnd;

      if (chunkEnd <= measureStart) continue;
      if (chunkStart >= measureStart + take) break;

      const localStart = Math.max(0, measureStart - chunkStart);
      const localEnd = Math.min(chunk.length, measureStart + take - chunkStart);
      for (let j = localStart; j < localEnd; j++) {
        sumSq += chunk[j] * chunk[j];
        copied++;
      }
    }

    if (copied < 10) return 0;
    return Math.sqrt(sumSq / copied);
  }

  /** 用正交解调测量信号在指定频率的相位（度）
   *  原理：将输入信号分别乘以 cos(2πft) 和 sin(2πft)，低通滤波后 atan2(Q,I)
   *  freq=信号频率, sampleRate=采样率, buffer=输入数据块数组, startSample=起始采样点
   *  totalLen=总采样数, settleCount=稳定期（跳过）, measureCount=测量窗长 */
  _measurePhase(freq, sampleRate, buffer, startSample, totalLen, settleCount, measureCount) {
    const bufBeforeStart = startSample;
    const samplesAfterStart = totalLen - bufBeforeStart;
    if (samplesAfterStart < settleCount + 10) return null;

    const measureStart = bufBeforeStart + settleCount;
    const available = totalLen - measureStart;
    const take = Math.min(available, measureCount);
    const omega = 2 * Math.PI * freq / sampleRate;

    let sumI = 0, sumQ = 0, count = 0;
    let cursor = 0;
    for (let i = 0; i < buffer.length; i++) {
      const chunk = buffer[i];
      const chunkStart = cursor;
      const chunkEnd = cursor + chunk.length;
      cursor = chunkEnd;

      if (chunkEnd <= measureStart) continue;
      if (chunkStart >= measureStart + take) break;

      const localStart = Math.max(0, measureStart - chunkStart);
      const localEnd = Math.min(chunk.length, measureStart + take - chunkStart);
      for (let j = localStart; j < localEnd; j++) {
        const t = (measureStart + count) * omega;
        sumI += chunk[j] * Math.cos(t);
        sumQ += chunk[j] * Math.sin(t);
        count++;
      }
    }
    if (count < 10) return null;
    return Math.atan2(sumQ, sumI) * 180 / Math.PI;
  }

  abortSweep() {
    this._sweepRunning = false;
    this._isRecording = false;
  }

  _sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  close() {
    this.stopNoise();
    this.abortSweep();
    this.stopMic();
    if (this.ctx) {
      this.ctx.close();
      this.ctx = null;
    }
  }
}

// ========================================================================
//  PEQManager — 管理参数均衡器
// ========================================================================
class PEQManager {
  constructor() {
    this.list = []; // {id, freq, gain, Q}
    this._nextId = 1;
    this._onChange = null;
  }

  onChange(cb) { this._onChange = cb; }

  add(freq = 1000, gain = 0, Q = 1.0, type = 'PK') {
    const peq = { id: this._nextId++, freq, gain, Q, type };
    this.list.push(peq);
    this._notify();
    return peq;
  }

  remove(id) {
    this.list = this.list.filter(p => p.id !== id);
    this._notify();
  }

  update(id, props) {
    const peq = this.list.find(p => p.id === id);
    if (!peq) return;
    Object.assign(peq, props);
    this._notify();
  }

  /** 清除所有 PEQ */
  clear() {
    this.list = [];
    this._notify();
  }

  /** 触发变更回调（通知图表重绘等） */
  _notify() {
    if (this._onChange) this._onChange(this.list);
  }

  /** 计算在给定频率下的总增益 (dB)，叠加所有 PEQ band 的响应（支持 PK/LSC/HSC） */
  getGainAt(freq, sampleRate = 48000) {
    let totalDB = 0;
    for (const peq of this.list) {
      const type = peq.type === 'LSC' ? AE.LSC : (peq.type === 'HSC' ? AE.HSC : AE.PK);
      totalDB += _filterGainAt(type, peq.freq, peq.gain, peq.Q, freq, sampleRate);
    }
    return totalDB;
  }

  /** 获取所有 PEQ 在多个频率点上的增益数组 */
  getResponse(freqs, sampleRate = 48000) {
    return freqs.map(f => this.getGainAt(f, sampleRate));
  }

  /** 获取 PEQ 组合在频响上的校正结果 */
  applyCorrection(originalFreqs, originalDB, sampleRate = 48000) {
    const peqGains = this.getResponse(originalFreqs, sampleRate);
    return originalDB.map((db, i) => db + peqGains[i]);
  }
}

function updateAutoPeqTarget() {
  if (!freqData || freqData.length < 5) return;
  const fLow = parseFloat(document.getElementById('autoPeqFreqLow').value) || 50;
  const fHigh = parseFloat(document.getElementById('autoPeqFreqHigh').value) || 16000;
  const vals = [];
  for (const d of freqData) {
    if (d.freq >= fLow && d.freq <= fHigh) vals.push(d.dB_norm ?? d.dB);
  }
  vals.sort((a, b) => a - b);
  const target = vals.length > 0 ? vals[Math.floor(vals.length / 2)] : 0;
  document.getElementById('autoPeqTarget').value = Math.round(target * 10) / 10;
}

// ========================================================================
//  自动 PEQ (autoeq-c 算法移植) — 基于梯度优化的多滤波器联合拟合法
//  流程：预处理(残差/平滑/去均值) → 顺序初始化 → AdaBelief 联合优化
// ========================================================================
// ========================================================================
// ========================================================================
//  autoeq-c 核心算法（JavaScript 移植）
//  原项目：https://github.com/peqdb/autoeq-c
//  替换原贪心搜索+网格优化联合梯度优化（AdaBelief）

const AE = { PK: 0, LSC: 1, HSC: 2 };

// ---- Biquad 系数计算（含解析梯度） ----

    b2: A*(cos_w*m1 - k + p1),         db2_dA: -A*dk_dA + A*cos_w + A + cos_w*m1 - k + p1,  db2_dalpha: -A*dk_dalpha, db2_dcos: A*m1,
    a0: -cos_w*m1 + k + p1,            da0_dA: dk_dA - cos_w + 1,                           da0_dalpha: dk_dalpha,    da0_dcos: -m1,
    a1: -2*cos_w*p1 + 2*m1,            da1_dA: 2 - 2*cos_w,                                                                  da1_dcos: -2*p1,
    a2: -cos_w*m1 - k + p1,            da2_dA: -dk_dA - cos_w + 1,                          da2_dalpha: -dk_dalpha,   da2_dcos: -m1,

const _BIQUAD_FNS = [_bqPK, _bqLSC, _bqHSC];

// ---- spectrum：计算单个滤波器在指定频率点的频响并累加到 y ----
function _spectrum(type, f0, gain, Q, fs, freqs, y) {
  const A = _exp10(gain / 40);
  const w0 = 2 * Math.PI / fs * f0;
  const cos_w = Math.cos(w0), sin_w = Math.sin(w0);
  const alpha = sin_w * 0.5 / Q;

  const b_x1 = -4*(s.b0*s.b1 + 4*s.b0*s.b2 + s.b1*s.b2);
  const b_x2 = 16*s.b0*s.b2;

  const a_x1 = -4*(s.a0*s.a1 + 4*s.a0*s.a2 + s.a1*s.a2);

    const phi = _sq(Math.sin(Math.PI / fs * freqs[k]));
    const b_poly = b_x0 + phi*(b_x1 + phi*b_x2);
    const a_poly = a_x0 + phi*(a_x1 + phi*a_x2);

}

// ---- 峰检测 (scipy-compatible: find_peaks + prominence + width) ----
function _largestPeak(x, freqs, lim) {
  const K = freqs.length;
  const H = Math.floor(K / 2);
  const peaks = [];
  for (let i = 1; i < K - 1; i++) {
    if (freqs[i] < lim.lo || freqs[i] > lim.hi) continue;
    if (x[i-1] >= x[i]) continue;
    let i_ahead = i + 1;
    while (i_ahead < K - 1 && x[i_ahead] === x[i]) i_ahead++;
    if (x[i_ahead] < x[i]) {
      peaks.push(Math.floor((i + i_ahead - 1) / 2));
      i = i_ahead;
    }
  }
  if (peaks.length === 0) return { idx: -1, width: 0, height: 0 };

  const prominences = []; const leftBases = []; const rightBases = [];
  for (let p = 0; p < peaks.length; p++) {
    const peak = peaks[p], xPeak = x[peak];
    leftBases[p] = peak; let leftMin = xPeak;
    for (let i = peak; i >= 0 && x[i] <= xPeak; i--) {
      if (x[i] < leftMin) { leftMin = x[i]; leftBases[p] = i; }
    }
    rightBases[p] = peak; let rightMin = xPeak;
    for (let i = peak; i < K && x[i] <= xPeak; i++) {
      if (x[i] < rightMin) { rightMin = x[i]; rightBases[p] = i; }
    }
    prominences[p] = xPeak - Math.max(leftMin, rightMin);
  }

  let bestSize = 0, best = { idx: -1, width: 0, height: 0 };
  for (let p = 0; p < peaks.length; p++) {
    const peak = peaks[p], xPeak = x[peak];
    const height = xPeak - 0.5*prominences[p];
    let i = peak; while (leftBases[p] < i && height < x[i]) i--;
    const leftIP = x[i] < height ? i + (height - x[i]) / (x[i+1] - x[i]) : i;
    i = peak; while (i < rightBases[p] && height < x[i]) i++;
    const rightIP = x[i] < height ? i - (height - x[i]) / (x[i-1] - x[i]) : i;
    const width = rightIP - leftIP, size = width * xPeak;
    if (size > bestSize) { bestSize = size; best = { idx: peak, width, height: xPeak }; }
  }
  return best;
}

// ---- 初始化函数 ----
function _initPK(y, freqs, fs, limF0, limGain, limQ) {
  const K = freqs.length;
  let rect = y.map(v => Math.max(v, 0));
  const peak = _largestPeak(rect, freqs, limF0);
  rect = y.map(v => Math.max(-v, 0));
  const dip = _largestPeak(rect, freqs, limF0);
  const p = peak.width*peak.height > dip.width*dip.height ? peak : dip;
  if (p.idx < 0) return { f0: 1000, gain: 0, Q: 1 };
  let f0 = freqs[p.idx], gain = p.idx === peak.idx ? peak.height : -dip.height;
  const bw = p.width * Math.log2(freqs[1] / freqs[0]);
  const bwExp2 = Math.pow(2, bw);
  let Q = Math.sqrt(bwExp2) / (bwExp2 - 1);
  gain = _clip(gain, limGain.lo, limGain.hi);
  Q = _clip(Q, limQ.lo, limQ.hi);
  return { f0, gain, Q };
}
function _initLSC(y, freqs, fs, limF0, limGain, limQ) {
  const K = freqs.length;
  const fl = { lo: Math.max(limF0.lo, 40), hi: Math.min(limF0.hi, 10000) };
  let best = 0, bestIdx = -1, a = 0;
  for (let k = 0; k < K; k++) { a += y[k]; const avg = Math.abs(a / (k + 1)); if (avg > best) { best = avg; bestIdx = k; } }
  if (bestIdx < 0) return { f0: 100, gain: 0, Q: 0.707 };
  let f0 = freqs[bestIdx], Q = 0.70710678;
  f0 = _clip(f0, fl.lo, fl.hi); Q = _clip(Q, limQ.lo, limQ.hi);
  const w = new Float64Array(K).fill(0);
  _spectrum(AE.LSC, f0, 1, Q, fs, freqs, w);
  let p = 0, c = 0;
  for (let k = 0; k < K; k++) { p += w[k]*y[k]; c += Math.abs(w[k]); }
  let gain = c > 0 ? p / c : 0;
  gain = _clip(gain, limGain.lo, limGain.hi);
  return { f0, gain, Q };
}

  const K = freqs.length;
  const fl = { lo: Math.max(limF0.lo, 40), hi: Math.min(limF0.hi, 10000) };
  let best = 0, bestIdx = -1, a = 0;
  for (let k = 0; k < K; k++) { a += y[K-1-k]; const avg = Math.abs(a / (k + 1)); if (avg > best) { best = avg; bestIdx = K-1-k; } }

  const w = new Float64Array(K).fill(0);
  _spectrum(AE.HSC, f0, 1, Q, fs, freqs, w);
  let p = 0, c = 0;
  for (let k = 0; k < K; k++) { p += w[k]*y[k]; c += Math.abs(w[k]); }

const _INIT_FNS = [_initPK, _initLSC, _initHSC];

/** 计算单个滤波器在指定频率的 dB 增益（支持 PK/LSC/HSC） */
function _filterGainAt(type, f0, gainDB, Q, freq, fs) {
  const A = _exp10(gainDB / 40);
  const w0 = 2 * Math.PI * f0 / fs;
  const cos_w = Math.cos(w0), sin_w = Math.sin(w0);
  const alpha = sin_w * 0.5 / Q;
  const s = _BIQUAD_FNS[type](A, cos_w, alpha);
  const phi = _sq(Math.sin(Math.PI / fs * freq));
  const ba = s.b0 + s.b1 + s.b2;
  const aa = s.a0 + s.a1 + s.a2;
  const b_x0 = _sq(ba);
  const b_x1 = -4*(s.b0*s.b1 + 4*s.b0*s.b2 + s.b1*s.b2);
  const b_x2 = 16*s.b0*s.b2;
  const a_x0 = _sq(aa);
  const a_x1 = -4*(s.a0*s.a1 + 4*s.a0*s.a2 + s.a1*s.a2);
  const a_x2 = 16*s.a0*s.a2;
  const b_poly = b_x0 + phi*(b_x1 + phi*b_x2);
  const a_poly = a_x0 + phi*(a_x1 + phi*a_x2);
  return 10 * Math.log10(Math.max(b_poly / a_poly, 1e-12));

// ---- 自适应平滑 (bilateral-ish filtering) ----
function _adaptiveSmooth(freqs, r, smoothF0, smoothF1, smoothLo, smoothHi,
    biasF0, biasF1, biasF2, biasF3, biasLo, biasMd, biasHi, clipF) {
  const K = freqs.length;
  const H = Math.max(1, Math.round(K / 8));
  const smoothL0 = Math.log(smoothF0), smoothL1 = Math.log(smoothF1);
  const biasL0 = Math.log(biasF0), biasL1 = Math.log(biasF1);
  const biasL2 = Math.log(biasF2), biasL3 = Math.log(biasF3);
  const x = r.slice();
  const clipIdx = _search(freqs, clipF);
  function _sgm(xx, x0, x1) {
    const SMOOTH = 4;
    const k = SMOOTH / (x1 - x0), m = 0.5*(x0 + x1);
    return 0.5*Math.tanh(0.5*k*(xx - m)) + 0.5;
  }
  for (let k = 0; k < K; k++) {
    const fk = freqs[k], l = Math.log(fk), xk = x[k];
    const sigma = smoothLo + (smoothHi - smoothLo)*_sgm(l, smoothL0, smoothL1);
    const bias = biasLo + (biasMd - biasLo)*_sgm(l, biasL0, biasL1) + (biasHi - biasMd)*_sgm(l, biasL2, biasL3);
    let a = 0, c = 0;
    for (let j = -H; j <= H; j++) {
      let s = k + j;
      s = s < 0 ? 0 : s > clipIdx ? clipIdx : s;
      const xs = x[s], dSpatial = _sq(j * sigma), dRange = bias * (xs - xk);
      const w = Math.exp(-0.5*dSpatial + dRange);
      a += w * x[s]; c += w;
    }
    r[k] = a / c;
  }
}

// ---- 高频滚降 ----
function _trebleRolloff(freqs, r, fTreble) {
  const K = freqs.length;
  const trebleIdx = _search(freqs, fTreble);
  const nTreble = K - trebleIdx;
  if (nTreble <= 1) return;
  const inv = 1 / (nTreble - 1);
  for (let i = 0; i < nTreble; i++) {
    const t = i * inv;
    r[trebleIdx + i] *= Math.cos(0.5 * Math.PI * t);
  }
}

// ---- AdaBelief 优化器 ----
class _AdaBelief {
  constructor(N) {
    this.N = N;
    this.W = 3*N + 1;
    this.b1 = 0.9; this.b2 = 0.99;
    this.b1t = 0.9; this.b2t = 0.99;
    this.eps = 1e-12; this.eps_root = 1e-12;
    this.lr = 3e-2;
    this.step = 0;
    this.m = new Float64Array(this.W);
    this.s = new Float64Array(this.W);
  }
  stepOpt(x, g) {
    for (let w = 0; w < this.W; w++) {
      this.m[w] = this.b1*this.m[w] + (1-this.b1)*g[w];
      this.s[w] = this.b2*this.s[w] + (1-this.b2)*_sq(g[w] - this.m[w]);
      const mHat = this.m[w] / (1 - this.b1t);
      const sHat = this.s[w] / (1 - this.b2t);
      const den = Math.sqrt(sHat + this.eps_root) + this.eps;
      x[w] -= this.lr * mHat / den;
    }
    this.b1t *= this.b1; this.b2t *= this.b2;
    this.step++;
  }
}

function _grad(types, phi, r, fs, N, optAmp, x, g) {

  const w0_v = [];

  for (let n = 0; n < N; n++) {

    const f0 = Math.exp(lf);

    const b_x2 = 16*s.b0*s.b2;
    const a_x0 = _sq(s.a0 + s.a1 + s.a2);
    const a_x1 = -4*(s.a0*s.a1 + 4*s.a0*s.a2 + s.a1*s.a2);
    const a_x2 = 16*s.a0*s.a2;
    const ba = s.b0 + s.b1 + s.b2;
    const aa = s.a0 + s.a1 + s.a2;
    const dy0 = []; const dy1 = []; const dy2 = [];
    for (let k = 0; k < K; k++) {
      const phiK = phi[k];
      const bPoly = b_x0 + phiK*(b_x1 + phiK*b_x2);
      const aPoly = a_x0 + phiK*(a_x1 + phiK*a_x2);
      pred[k] *= bPoly / aPoly;
      const _8phi2 = 8*_sq(phiK), _2phi = 2*phiK;
      const bm = 20/Math.LN10 / bPoly, am = -20/Math.LN10 / aPoly;
      const dy_db0 = bm * (ba - _2phi*(s.b1 + 4*s.b2) + _8phi2*s.b2);
      const dy_db1 = bm * (ba - _2phi*(s.b0 + s.b2));
      const dy_db2 = bm * (ba - _2phi*(4*s.b0 + s.b1) + _8phi2*s.b0);
      const dy_da0 = am * (aa - _2phi*(s.a1 + 4*s.a2) + _8phi2*s.a2);
      const dy_da1 = am * (aa - _2phi*(s.a0 + s.a2));
      const dy_da2 = am * (aa - _2phi*(4*s.a0 + s.a1) + _8phi2*s.a0);
      const dy_dA = dy_db0*s.db0_dA + dy_db1*s.db1_dA + dy_db2*s.db2_dA
                  + dy_da0*s.da0_dA + dy_da1*s.da1_dA + dy_da2*s.da2_dA;
      const dy_dalpha = dy_db0*s.db0_dalpha + dy_db2*s.db2_dalpha
                      + dy_da0*s.da0_dalpha + dy_da2*s.da2_dalpha;
      const dy_dcos = dy_db0*s.db0_dcos + dy_db1*s.db1_dcos + dy_db2*s.db2_dcos
                    + dy_da0*s.da0_dcos + dy_da1*s.da1_dcos + dy_da2*s.da2_dcos;
      dy0[k] = dy_dalpha*dalpha_dw0 + dy_dcos*dcos_dw0;
      dy1[k] = dy_dA*dA_dgain;
      dy2[k] = dy_dalpha*dalpha_dbw;
    }
    dy_dw0[n] = dy0; dy_dgain[n] = dy1; dy_dbw[n] = dy2;
  }

  let L = 0; const dL_dy = new Float64Array(K); let dL_dySum = 0;
  for (let k = 0; k < K; k++) {
    const d = 10*Math.log10(pred[k]) - r[k];
    L += _sq(d);
    dL_dySum += dL_dy[k] = 2*d;
  }
  L *= rK;
  // amp gradient
  g[3*N] = optAmp ? dL_dySum * rK : 0;
  for (let n = 0; n < N; n++) {
    let glf = 0, ggain = 0, gbw = 0;
    for (let k = 0; k < K; k++) {
      glf += dL_dy[k]*dy_dw0[n][k];
      ggain += dL_dy[k]*dy_dgain[n][k];
      gbw += dL_dy[k]*dy_dbw[n][k];
    }
    g[0*N + n] = glf * rK * w0_v[n];
    g[1*N + n] = ggain * rK;
    g[2*N + n] = gbw * rK;
  }
  return L;
}

// ---- 主拟合循环 ----
function _fit(steps, types, f0, gain, Q, amp, f0Lim, gainLim, QLim, N, freqs, r, fs) {
  const K = freqs.length;
  const lfLim = [], bwLim = [];
  for (let n = 0; n < N; n++) {
    lfLim[n] = { lo: Math.log(f0Lim[n].lo), hi: Math.log(f0Lim[n].hi) };
    bwLim[n] = { lo: _q2bw(QLim[n].hi), hi: _q2bw(QLim[n].lo) };
  }
  const phi = new Float64Array(K);
  for (let k = 0; k < K; k++) phi[k] = _sq(Math.sin(Math.PI / fs * freqs[k]));

  const x = new Float64Array(3*N + 1);
  for (let n = 0; n < N; n++) {
    x[0*N + n] = Math.log(f0[n]);
    x[1*N + n] = gain[n];
    x[2*N + n] = _q2bw(Q[n]);
  }
  if (amp != null) x[3*N] = amp;
  const optAmp = amp != null;

  const g = new Float64Array(3*N + 1);
  let bestL = 1e9;
  const bestX = new Float64Array(3*N + 1);
  const opt = new _AdaBelief(N);

  for (let step = 0; step < steps; step++) {
    const L = _grad(types, phi, r, fs, N, optAmp, x, g);
    opt.stepOpt(x, g);
    // box constraints
    for (let n = 0; n < N; n++) {
      if (x[0*N + n] !== _clip(x[0*N + n], lfLim[n].lo, lfLim[n].hi)) { x[0*N + n] = _clip(x[0*N + n], lfLim[n].lo, lfLim[n].hi); opt.m[0*N + n] = 0; }
      if (x[1*N + n] !== _clip(x[1*N + n], gainLim[n].lo, gainLim[n].hi)) { x[1*N + n] = _clip(x[1*N + n], gainLim[n].lo, gainLim[n].hi); opt.m[1*N + n] = 0; }
      if (x[2*N + n] !== _clip(x[2*N + n], bwLim[n].lo, bwLim[n].hi)) { x[2*N + n] = _clip(x[2*N + n], bwLim[n].lo, bwLim[n].hi); opt.m[2*N + n] = 0; }
    }
    if (L < bestL) { bestL = L; for (let w = 0; w < 3*N+1; w++) bestX[w] = x[w]; }
  }
  for (let n = 0; n < N; n++) {
    f0[n] = Math.exp(bestX[0*N + n]);
    gain[n] = bestX[1*N + n];
    Q[n] = _bw2q(bestX[2*N + n]);
  }
  if (amp != null) amp = bestX[3*N];
  return { amp, loss: bestL };
}

// ---- 预处理 ----
function _preprocess(freqs, dst, src, r, smooth, demean) {
  const K = freqs.length;
  for (let k = 0; k < K; k++) r[k] = dst[k] - src[k];
  if (smooth) {
    _adaptiveSmooth(freqs, r,
      smooth.smoothF0, smooth.smoothF1, smooth.smoothLo, smooth.smoothHi,
      smooth.biasF0, smooth.biasF1, smooth.biasF2, smooth.biasF3,
      smooth.biasLo, smooth.biasMd, smooth.biasHi, smooth.clipF);
  }
  let mean = 0;
  if (demean) {
    const sum = r.reduce((a, b) => a + b, 0);
    mean = sum / K;
    for (let k = 0; k < K; k++) r[k] -= mean;
  }
  _trebleRolloff(freqs, r, smooth ? 16000 : 18500);
  return mean;
}

// ---- 顶层 autoeq ----
function _autoeq(steps, types, f0, gain, Q, amp, f0Lim, gainLim, QLim, N, freqs, r, fs) {
  const K = freqs.length;
  const rInit = r.slice();
  // 顺序初始化
  for (let n = 0; n < N; n++) {
    const p = _INIT_FNS[types[n]](rInit, freqs, fs, f0Lim[n], gainLim[n], QLim[n]);
    _spectrum(types[n], p.f0, -p.gain, p.Q, fs, freqs, rInit);
    f0[n] = p.f0; gain[n] = p.gain; Q[n] = p.Q;
  }
  if (amp != null) amp = 0;
  return _fit(steps, types, f0, gain, Q, amp, f0Lim, gainLim, QLim, N, freqs, r, fs);
}

// ---- 对外接口：改名为 generateAutoPEQ，保持与原调用方兼容 ----
function generateAutoPEQ(freqData, count, freqLow, freqHigh, maxGain, tiltDB, useShelving) {
  if (!freqData || freqData.length < 5) return [];

  const K = freqData.length;
  const freqs = freqData.map(d => d.freq);
  const rawDB = freqData.map(d => d.dB);
  const maxDB = Math.max(...rawDB);
  const dbNorm = rawDB.map(v => v - maxDB);

  // 轻度平滑原始测量数据，消除单点测量伪影（如驻波相消导致的孤立深谷）
  // 使用 1 遍 3 点加权平均：中间点权重 50%，两侧各 25%
  const smoothed = dbNorm.slice();
  for (let i = 1; i < K - 1; i++) {
    // 仅当当前点与两侧差异显著（> 5dB）时才平滑，避免抹平真实峰谷
    const diff = Math.abs(2 * dbNorm[i] - dbNorm[i - 1] - dbNorm[i + 1]);
    if (diff > 5) {
      smoothed[i] = dbNorm[i - 1] * 0.25 + dbNorm[i] * 0.5 + dbNorm[i + 1] * 0.25;
    }
  }

  // 倾斜曲线：tiltDB 表示 20Hz 比 20000Hz 高出的 dB 数
  const log20 = Math.log(20), log20k = Math.log(20000);
  const tiltOffsets = (tiltDB != null && tiltDB !== 0) ? freqs.map(f => {
    const fl = Math.max(f, 20);
    const ratio = (Math.log(fl) - log20) / (log20k - log20);
    return tiltDB * (0.5 - Math.min(1, Math.max(0, ratio)));
  }) : null;

  // 构建源曲线和目标曲线
  // 目标固定为 0dB（去均值后等效于测量值中位数）
  const src = smoothed;
  const dst = new Float64Array(K); // 全零

  // 残差 = dst - src，由 _preprocess 计算
  // 频率范围屏蔽在预处理后手动应用
  const r = [];
  for (let k = 0; k < K; k++) r[k] = 0;

  // 配置滤波器类型 [LSC, HSC, PK, PK, ...]
  const N = Math.min(count, 32);
  const types = [];
  const f0Lim = [], gainLim = [], QLim = [];
  const f0 = new Float64Array(N), gain = new Float64Array(N), Q = new Float64Array(N);

  // 使用用户设定的频响调整范围作为滤波器频率限制
  // 留 2% 边界余量，避免滤波器聚集在范围边缘
  const fl = Math.max(freqLow || 20, 20) * 1.02;
  const fh = Math.min(freqHigh || 20000, 20000) * 0.98;
  const lim = { lo: fl, hi: fh };
  const gLim = { lo: -maxGain, hi: maxGain };
  const qLim = { lo: 0.4, hi: 4 };

  for (let n = 0; n < N; n++) {
    if (n === 0 && useShelving) { types[n] = AE.LSC; f0Lim[n] = { lo: Math.max(fl, 40), hi: Math.min(fh, 10000) }; gainLim[n] = gLim; QLim[n] = { lo: 0.4, hi: 3 }; }
    else if (n === 1 && useShelving) { types[n] = AE.HSC; f0Lim[n] = { lo: Math.max(fl, 40), hi: Math.min(fh, 10000) }; gainLim[n] = gLim; QLim[n] = { lo: 0.4, hi: 3 }; }
    else                    { types[n] = AE.PK;  f0Lim[n] = lim; gainLim[n] = gLim; QLim[n] = qLim; }
  }

  const FS = 48000;

  // 自适应平滑 (通用配置)
  const smooth = {
    smoothLo: 0.3, smoothHi: 0.03,
    smoothF0: 3000, smoothF1: 12000,
    biasLo: 0, biasMd: 0.15, biasHi: 0.03,
    biasF0: 10000, biasF1: 13000,
    biasF2: 14000, biasF3: 20000,
    clipF: 18500,
  };

  // 预处理（平滑 + 去均值 + 高频滚降）
  const residual = new Float64Array(K);
  const meanOffset = _preprocess(freqs, dst, src, residual, smooth, true);

  // 在去均值之后叠加倾斜曲线，避免 center_mean 抵消倾斜
  if (tiltOffsets) {
    for (let k = 0; k < K; k++) residual[k] += tiltOffsets[k];
  }

  // 频率范围屏蔽（含边界），在预处理后执行
  if (freqLow && freqHigh) {
    for (let i = 0; i < K; i++) {
      if (freqs[i] <= freqLow || freqs[i] >= freqHigh) residual[i] = 0;
    }
  }

  // 执行优化 (1200 步迭代)
  const result = _autoeq(
    1200, types, f0, gain, Q, 0,
    f0Lim, gainLim, QLim, N, freqs, residual, FS
  );

  // 组装返回格式（不预先四舍五入，后处理完再统一舍入）
  const bands = [];
  for (let n = 0; n < N; n++) {
    const gv = gain[n];
    if (Math.abs(gv) < 0.3) continue;
    bands.push({ freq: f0[n], gain: gv, Q: Q[n], type: types[n] === AE.LSC ? 'LSC' : (types[n] === AE.HSC ? 'HSC' : 'PK') });
  }
  bands.sort((a, b) => a.freq - b.freq);

  // 后处理：合并邻近的重复滤波器
  // 扫描过程中 bands 会变短，使用 while 循环
  let changed = true;
  while (changed) {
    changed = false;
    for (let i = bands.length - 1; i >= 1 && !changed; i--) {
      for (let j = i - 1; j >= 0 && !changed; j--) {
        const ratio = bands[i].freq / bands[j].freq;
        if (ratio > 1.05) continue; // 频率相差 > 5%，跳过

        // --- 情况 A：同号增益 → 合并为单个滤波器 ---
        if (bands[i].gain * bands[j].gain >= 0) {
          const abs_i = Math.abs(bands[i].gain);
          const abs_j = Math.abs(bands[j].gain);
          const total = abs_i + abs_j;
          const merged = {
            freq: (bands[i].freq * abs_i + bands[j].freq * abs_j) / total,
            gain: bands[i].gain + bands[j].gain,
            Q: Math.max(bands[i].Q, bands[j].Q),
            type: bands[i].type || bands[j].type || 'PK',
          };
          bands[j] = merged;
          bands.splice(i, 1);
          changed = true;
          break;
        }

        // --- 情况 B：异号增益且近似抵消 → 移除两者 ---
        const net = bands[i].gain + bands[j].gain;
        if (Math.abs(net) < 0.5) {
          bands.splice(j, 1);
          bands.splice(i - 1, 1);
          changed = true;
          break;
        }

        // --- 情况 C：异号但不抵消 → 只保留主导的 ---
        // 增益较小的那个移除，因为它被较大的抵消了大部分
        const abs_i = Math.abs(bands[i].gain);
        const abs_j = Math.abs(bands[j].gain);
        if (abs_i > abs_j * 1.5) {
          bands.splice(j, 1);
          changed = true;
          break;
        } else if (abs_j > abs_i * 1.5) {
          bands.splice(i, 1);
          changed = true;
          break;
        }
      }
    }
  }

  // 统一四舍五入并过滤极小增益
  const finalBands = bands
    .filter(b => Math.abs(b.gain) >= 0.5)
    .map(b => ({
      freq: Math.round(b.freq),
      gain: Math.round(b.gain * 10) / 10,
      Q: Math.round(b.Q * 100) / 100,
      type: b.type || 'PK',
    }));
  finalBands.sort((a, b) => a.freq - b.freq);

  // 后处理：修剪边界高增益滤波器
  // 如果 HSC/LSC 在边界处增益接近 maxGain，降低 Q 使其更平缓
  for (const b of finalBands) {
    const nearLo = freqLow && b.freq <= freqLow * 1.1;
    const nearHi = freqHigh && b.freq >= freqHigh * 0.9;
    if ((nearLo || nearHi) && Math.abs(b.gain) >= maxGain * 0.9) {
      b.Q = Math.max(0.4, b.Q * 0.7);
    }
  }

  return finalBands;
}

// ========================================================================
// ========================================================================
class ChartRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this._freqData = null; // [{freq, dB_norm}]
    this._peqManager = null;
    this._dpr = window.devicePixelRatio || 1;
    this.resize();
    window.addEventListener('resize', () => this.resize());
    // 监听单/双栏布局断点，确保切换时 canvas 正确缩放
    const mq = window.matchMedia('(max-width: 900px)');
    mq.addEventListener('change', () => {
      requestAnimationFrame(() => this.resize());
    });
  }

  resize() {
    // 重新读取 DPR 以支持浏览器 zoom 缩放
    this._dpr = window.devicePixelRatio || 1;
    const rect = this.canvas.parentElement.getBoundingClientRect();
    const w = rect.width;
    const h = Math.max(260, w * 0.45);
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
    this.canvas.width = w * this._dpr;
    this.canvas.height = h * this._dpr;
    this.ctx.setTransform(this._dpr, 0, 0, this._dpr, 0, 0);
    this._w = w;
    this._h = h;
    this.draw();
  }

  setFreqData(data) {
    this._freqData = data;
    this.draw();
  }

  setPEQManager(mgr) {
    this._peqManager = mgr;
    this.draw();
  }

  draw() {
    const ctx = this.ctx;
    const w = this._w;
    const h = this._h;
    if (!w || !h) return;

    ctx.clearRect(0, 0, w, h);

    // Grid
    this._drawGrid(ctx, w, h);

    const data = this._freqData;
    if (!data || data.length < 3) {
      this._drawPlaceholder(ctx, w, h);
      return;
    }

    const margin = { top: 18, bottom: 30, left: 50, right: 64 };
    const plotW = w - margin.left - margin.right;
    const plotH = h - margin.top - margin.bottom;

    const freqs = data.map(d => d.freq);
    const rawDB = data.map(d => d.dB_norm);
    const rawPhase = data.map(d => d.phase);
    const hasPhase = rawPhase && rawPhase.some(p => p != null && !isNaN(p));

    // === 双 Y 轴范围计算 ===
    let correctedDB = null;
    let peqGains = null;
    if (this._peqManager && this._peqManager.list.length > 0) {
      peqGains = this._peqManager.getResponse(freqs, 48000);
      correctedDB = rawDB.map((db, i) => db + peqGains[i]);
    }

    // 左轴：频响数据以数据范围居中（0dB 不一定在中间）
    let leftVals = [...rawDB];
    if (correctedDB) leftVals = leftVals.concat(correctedDB);
    const lDataMin = Math.min(...leftVals);
    const lDataMax = Math.max(...leftVals);
    let lRange = lDataMax - lDataMin;
    if (lRange < 6) lRange = 6;
    const lCenter = (lDataMin + lDataMax) / 2;
    const lHalf = lRange * 0.75;
    const lMin = lCenter - lHalf;
    const lMax = lCenter + lHalf;

    // 右轴：PEQ 数据以 0dB 对称居中
    let rightMaxAbs = 5;
    if (peqGains) rightMaxAbs = Math.max(...peqGains.map(v => Math.abs(v)), 5);
    const rightPad = Math.max(3, rightMaxAbs * 0.2);
    const rMin = -(rightMaxAbs + rightPad);
    const rMax = rightMaxAbs + rightPad;

    document.getElementById('yRangeLabel').textContent =
      `L ${lMin.toFixed(0)}~${lMax.toFixed(0)}  R ${rMin.toFixed(0)}~${rMax.toFixed(0)} dB` +
      (hasPhase ? ' · Phase ✓' : '');

    // Axes (双Y + 精细X)
    this._drawAxes(ctx, margin, w, h, plotW, plotH, freqs, lMin, lMax, rMin, rMax);

    const logLow = Math.log(freqs[0]);
    const logHigh = Math.log(freqs[freqs.length - 1]);
    const xScale = (f) => {
      const p = (Math.log(f) - logLow) / (logHigh - logLow);
      return margin.left + p * plotW;
    };
    const yScaleL = (db) => margin.top + plotH - ((db - lMin) / (lMax - lMin)) * plotH;
    const yScaleR = (db) => margin.top + plotH - ((db - rMin) / (rMax - rMin)) * plotH;

    // === Draw original frequency response (左轴) ===
    ctx.beginPath();
    for (let i = 0; i < data.length; i++) {
      const x = xScale(freqs[i]);
      const y = yScaleL(rawDB[i]);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(xScale(freqs[0]), margin.top + plotH);
    for (let i = 0; i < data.length; i++) {
      ctx.lineTo(xScale(freqs[i]), yScaleL(rawDB[i]));
    }
    ctx.lineTo(xScale(freqs[freqs.length - 1]), margin.top + plotH);
    ctx.closePath();
    ctx.fillStyle = 'rgba(59, 130, 246, 0.12)';
    ctx.fill();

    // === Draw PEQ curve (右轴) ===
    if (peqGains) {
      ctx.beginPath();
      for (let i = 0; i < freqs.length; i++) {
        const x = xScale(freqs[i]);
        const y = yScaleR(peqGains[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = '#da3633';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // === Draw corrected response (左轴) ===
    if (correctedDB) {
      ctx.beginPath();
      for (let i = 0; i < correctedDB.length; i++) {
        const x = xScale(freqs[i]);
        const y = yScaleL(correctedDB[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = '#3fb950';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }

    // === Draw PEQ markers at bottom ===
    if (this._peqManager && this._peqManager.list.length > 0) {
      for (const peq of this._peqManager.list) {
        if (peq.freq < freqs[0] || peq.freq > freqs[freqs.length - 1]) continue;
        const x = xScale(peq.freq);
        ctx.beginPath();
        ctx.arc(x, margin.top + plotH + 8, 4, 0, Math.PI * 2);
        ctx.fillStyle = peq.gain >= 0 ? '#da3633' : '#3b82f6';
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x, margin.top + plotH + 4);
        ctx.lineTo(x, margin.top + plotH + 12);
        ctx.strokeStyle = '#30363d';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // === Draw phase curve (深灰，右轴 -360~360) ===
    if (rawPhase) {
      const pMin = -360, pMax = 360;
      const yScaleP = (deg) => margin.top + plotH - ((deg - pMin) / (pMax - pMin)) * plotH;
      ctx.beginPath();
      let started = false;
      let hasAny = false;
      for (let i = 0; i < data.length; i++) {
        if (rawPhase[i] == null || isNaN(rawPhase[i])) continue;
        hasAny = true;
        const x = xScale(freqs[i]);
        const y = yScaleP(rawPhase[i]);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      if (hasAny) {
        ctx.strokeStyle = 'rgba(139, 148, 158, 1)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([2, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  _drawGrid(ctx, w, h) {
    const steps = 10;
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= steps; i++) {
      const y = (h / steps) * i;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
  }

  _drawAxes(ctx, margin, w, h, plotW, plotH, freqs, lMin, lMax, rMin, rMax) {
    const logLow = Math.log(freqs[0]);
    const logHigh = Math.log(freqs[freqs.length - 1]);
    const xPos = (f) => {
      const p = (Math.log(f) - logLow) / (logHigh - logLow);
      return margin.left + p * plotW;
    };

    ctx.fillStyle = '#8b949e';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'center';

    // ---- X axis 精细频率标注 ----
    // 生成候选标注点
    const candidates = [];
    for (let f = 10; f <= 100; f += 10) candidates.push(f);
    for (let f = 100; f <= 1000; f += 100) candidates.push(f);
    for (let f = 1000; f <= 10000; f += 1000) candidates.push(f);
    for (let f = 10000; f <= 20000; f += 2000) candidates.push(f);
    // 去重 + 过滤范围
    const fMin = freqs[0], fMax = freqs[freqs.length - 1];
    const unique = [...new Set(candidates)].filter(f => f >= fMin && f <= fMax);
    // 按像素位置去重叠（至少间隔 35px）
    const labels = [];
    let lastX = -Infinity;
    for (const f of unique) {
      const x = xPos(f);
      if (x - lastX >= 35) { labels.push(f); lastX = x; }
    }

    for (const f of labels) {
      const x = xPos(f);
      ctx.fillText(f >= 1000 ? `${(f/1000).toFixed(f%1000===0?0:1)}k` : `${f}`, x, h - 8);
      ctx.beginPath();
      ctx.moveTo(x, margin.top);
      ctx.lineTo(x, margin.top + plotH);
      ctx.strokeStyle = '#1c2128';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // ---- 左 Y 轴 (频响) ----
    ctx.textAlign = 'right';
    ctx.fillStyle = '#58a6ff';
    ctx.font = '9px -apple-system, sans-serif';
    const numYL = 6;
    for (let i = 0; i <= numYL; i++) {
      const db = lMin + (lMax - lMin) * i / numYL;
      const y = margin.top + plotH - (i / numYL) * plotH;
      ctx.fillText(`${db.toFixed(1)}`, margin.left - 6, y + 3);
      // 网格线（基于左轴）
      ctx.beginPath();
      ctx.moveTo(margin.left, y);
      ctx.lineTo(margin.left + plotW, y);
      ctx.strokeStyle = i === Math.round(numYL / 2) ? '#30363d' : '#1c2128';
      ctx.lineWidth = i === Math.round(numYL / 2) ? 1 : 0.5;
      ctx.stroke();
    }
    // 左轴标签
    ctx.save();
    ctx.translate(10, margin.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#58a6ff';
    ctx.font = '9px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(typeof tr !== 'undefined' ? tr('axisLeft') : '频响 dB', 0, 0);
    ctx.restore();

    // ---- 右 Y 轴 (PEQ) ----
    ctx.textAlign = 'left';
    ctx.fillStyle = '#da3633';
    ctx.font = '9px -apple-system, sans-serif';
    const numYR = 6;
    for (let i = 0; i <= numYR; i++) {
      const db = rMin + (rMax - rMin) * i / numYR;
      const y = margin.top + plotH - (i / numYR) * plotH;
      ctx.fillText(`${db.toFixed(1)}`, margin.left + plotW + 6, y + 3);
    }
    // 右轴标签
    ctx.save();
    ctx.translate(w - 8, margin.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#da3633';
    ctx.font = '9px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(typeof tr !== 'undefined' ? tr('axisRight') : 'PEQ dB', 0, 0);
    ctx.restore();

    // ---- 第三右 Y 轴 (Phase) ----
    ctx.textAlign = 'left';
    ctx.fillStyle = '#6e7681';
    ctx.font = '9px -apple-system, sans-serif';
    const numYP = 6;
    const pMin = -360, pMax = 360;
    for (let i = 0; i <= numYP; i++) {
      const deg = pMin + (pMax - pMin) * i / numYP;
      const y = margin.top + plotH - (i / numYP) * plotH;
      ctx.fillText(`${deg}°`, margin.left + plotW + 30, y + 3);
    }
    // 相位轴标签
    ctx.save();
    ctx.translate(w - 3, margin.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#6e7681';
    ctx.font = '9px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Phase °', 0, 0);
    ctx.restore();

    // Hz 单位
    ctx.textAlign = 'center';
    ctx.fillStyle = '#6e7681';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillText(typeof tr !== 'undefined' ? tr('hz') : 'Hz', w / 2, h - 2);
  }

  _drawPlaceholder(ctx, w, h) {
    const p1 = typeof tr !== 'undefined' ? tr('placeholder1') : '执行扫频测量以获取频率响应';
    const p2 = typeof tr !== 'undefined' ? tr('placeholder2') : '点击左侧「开始扫频」按钮';
    ctx.fillStyle = '#30363d';
    ctx.font = '14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p1, w / 2, h / 2 - 6);
    ctx.font = '12px -apple-system, sans-serif';
    ctx.fillStyle = '#484f58';
    ctx.fillText(p2, w / 2, h / 2 + 18);
  }
}

// ---- 输入电平表 (requestAnimationFrame 驱动) ----
let _meterRaf = null;
let _noiseLevelTimer = null;
function updateLevelMeter() {
  _meterRaf = requestAnimationFrame(updateLevelMeter);
  const analyser = audio.micAnalyser;
  if (!analyser) {
    $meterFill.style.width = '0%';
    $levelDB.textContent = '—∞ dB';
    return;
  }
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  // RMS
  let sumSq = 0;
  for (let i = 0; i < buf.length; i++) sumSq += buf[i] * buf[i];
  const rms = Math.sqrt(sumSq / buf.length);
  // dBFS (RMS), reference 1.0 = 0 dB
  const dB = rms > 1e-9 ? 20 * Math.log10(rms) : -100;
  // 显示范围 -70 ~ 0 dB，信号再弱也保留 1% 宽度让条可见
  const clamped = Math.max(-70, Math.min(0, dB));
  const pct = ((clamped + 70) / 70) * 99 + 1;
  $meterFill.style.width = pct + '%';
  if (dB <= -85) {
    $levelDB.textContent = '—∞ dB';
  } else if (dB <= -70) {
    $levelDB.textContent = `< -70 dB`;
  } else {
    $levelDB.textContent = `${dB.toFixed(1)} dB`;
  }
}

function startLevelMeter() {
  if (_meterRaf) cancelAnimationFrame(_meterRaf);
  $levelLabel.textContent = tr('micReady');
  updateLevelMeter();
}
function stopLevelMeter() {
  if (_meterRaf) { cancelAnimationFrame(_meterRaf); _meterRaf = null; }
  $meterFill.style.width = '0%';
  $levelDB.textContent = '—∞ dB';
  $levelLabel.textContent = '—';
}

/** 白噪声播放时每秒读取输入电平，更新目标增益 */
function startNoiseLevelMonitor() {
  stopNoiseLevelMonitor();
  const $target = document.getElementById('autoPeqTarget');
  _noiseLevelTimer = setInterval(() => {
    const analyser = audio.micAnalyser;
    if (!analyser) return;
    const buf = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buf);
    let sumSq = 0;
    for (let i = 0; i < buf.length; i++) sumSq += buf[i] * buf[i];
    const rms = Math.sqrt(sumSq / buf.length);
    // dBFS (RMS), 参考 1.0 = 0 dB
    const dB = rms > 1e-9 ? 20 * Math.log10(rms) : -100;
    // 钳位到 -60 ~ 0 范围，保留一位小数
    const clamped = Math.max(-60, Math.min(0, dB));
    $target.value = Math.round(clamped * 10) / 10;
  }, 1000);
}
function stopNoiseLevelMonitor() {
  if (_noiseLevelTimer) {
    clearInterval(_noiseLevelTimer);
    _noiseLevelTimer = null;
  }
}

/**
 * 自动调整输入电平 —— 播放白噪声并调整 micGain，使 RMS 电平接近 -15 dB
 * 调整过程中输入增益滑杆不可用，调整完成后恢复
 */
function autoAdjustInputLevel() {
  // 如果扫频正在运行，不执行
  if (audio._sweepRunning) return;

  if (!audio.ctx || audio.ctx.state === 'closed') {
    ensureAudioReady().then(ok => { if (ok) _doAutoAdjust(); });
    return;
  }
  if (audio.ctx.state === 'suspended') {
    audio.ctx.resume().then(() => _doAutoAdjust());
    return;
  }
  _doAutoAdjust();

  function _doAutoAdjust() {
    // 确保白噪声已播放
    const noiseWasPlaying = !!audio._noiseSource;
    if (!noiseWasPlaying) {
      audio.startNoise(0);
      startLevelMeter();
      startNoiseLevelMonitor();
      lockDevices(true);
      $playNoise.disabled = true;
      $stopNoise.disabled = false;
      $startSweep.disabled = true;
    }

    // 禁用滑杆和按钮
    $inGain.disabled = true;
    $autoLevelBtn.disabled = true;
    const origBtnText = $autoLevelBtn.textContent;

    const TARGET_DB = -20;
    const TOLERANCE = 2;        // ±2 dB 视为达标
    const INTERVAL_MS = 200;    // 每 200ms 采样一次
    const MAX_ITERATIONS = 30;  // 最多调整 6 秒

    let iteration = 0;
    let stableCount = 0;
    let timer = null;

    function stopAdjust() {
      if (timer) clearInterval(timer);
      $inGain.disabled = false;
      // 只有白噪声还在播放时才启用自动调整按钮
      $autoLevelBtn.disabled = !audio._noiseSource;
      $autoLevelBtn.textContent = origBtnText;
    }

    timer = setInterval(() => {
      const analyser = audio.micAnalyser;
      if (!analyser) { stopAdjust(); return; }

      // 如果白噪声已停止（用户手动点击了停止），也停止调整
      if (!audio._noiseSource) { stopAdjust(); return; }

      // 读取当前 RMS 电平
      const buf = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(buf);
      let sumSq = 0;
      for (let i = 0; i < buf.length; i++) sumSq += buf[i] * buf[i];
      const rms = Math.sqrt(sumSq / buf.length);
      const currentDB = rms > 1e-9 ? 20 * Math.log10(rms) : -100;

      // 计算与目标电平的差值
      const deltaDB = TARGET_DB - currentDB;

      // 检查是否达标（连续 3 次稳定在容差内）
      if (Math.abs(deltaDB) <= TOLERANCE) {
        stableCount++;
        if (stableCount >= 3) { stopAdjust(); return; }
        iteration++;
        if (iteration >= MAX_ITERATIONS) { stopAdjust(); return; }
        return;  // 未连续达标则继续观察
      }
      stableCount = 0;  // 未达标，重置稳定计数

      // 计算并应用新增益
      let newGainDB = currentDB < -60 ? Math.min(36, parseFloat($inGain.value) + 12) : parseFloat($inGain.value) + deltaDB;
      newGainDB = Math.round(Math.max(-12, Math.min(36, newGainDB)));

      audio.setInGain(newGainDB);
      $inGain.value = newGainDB;
      $inGainVal.textContent = newGainDB;

      iteration++;
      if (iteration >= MAX_ITERATIONS) { stopAdjust(); }
    }, INTERVAL_MS);
  }
}

// ---- 可拖动分隔条 ----
(function initResizer() {
  const resizer = document.getElementById('resizer');
  const leftCol = document.querySelector('.left-col');
  let startX = 0, startW = 0;

  function onDrag(e) {
    const dx = e.clientX - startX;
    const newW = Math.max(200, Math.min(500, startW + dx));
    leftCol.style.width = newW + 'px';
  }

  function stopDrag() {
    resizer.classList.remove('resizing');
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // 触发 canvas 重绘
    if (chart) setTimeout(() => chart.resize(), 50);
  }

  resizer.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startX = e.clientX;
    startW = leftCol.getBoundingClientRect().width;
    resizer.classList.add('resizing');
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
})();
